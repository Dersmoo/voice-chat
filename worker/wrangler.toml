# Cloudflare Worker configuration
name = "voice-chat"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Custom domain — routes voice.dercraftia.com to this Worker
routes = [
  { pattern = "voice.dercraftia.com/*", zone_name = "dercraftia.com" }
]

# Durable Object binding for room management
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "VoiceChatRoom"

# Durable Object migration
[[migrations]]
tag = "v1"
new_sqlite_classes = ["VoiceChatRoom"]

# Environment variables — fill in your Cloudflare Realtime credentials
[vars]
TURN_APP_ID = ""       # From Cloudflare Realtime dashboard
TURN_APP_SECRET = ""   # From Cloudflare Realtime dashboard
MAX_PEERS_PER_ROOM = "10"
